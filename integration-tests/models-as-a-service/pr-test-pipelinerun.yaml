---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: models-as-a-service-e2e-test
spec:
  pipelineSpec:
    description: |
      An integration test which provisions an ephemeral Hypershift cluster, deploys opendatahub-operator
      from a Konflux snapshot and runs the e2e tests against it.
    params:
      - description: Snapshot of the application
        name: SNAPSHOT
        type: string
      - name: oci-artifacts-repo
        default: 'quay.io/opendatahub/odh-ci-artifacts'
        description: The OCI container used to store all test artifacts.
      - name: artifact-browser-url
        default: 'https://app-artifact-browser.apps.rosa.konflux-qe.zmr9.p3.openshiftapps.com'
        description: The URL for browsing test artifacts.
    tasks:
      - name: parse-metadata
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/integration-examples
            - name: revision
              value: main
            - name: pathInRepo
              value: tasks/test_metadata.yaml
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
      - name: find-component-image
        description: Extract MaaS component images from the Konflux snapshot and resolve PR-tagged refs
        runAfter:
          - parse-metadata
        params:
          - name: SNAPSHOT
            value: $(params.SNAPSHOT)
          - name: PR_NUMBER
            value: $(tasks.parse-metadata.results.pull-request-number)
        taskSpec:
          params:
          - name: SNAPSHOT
          - name: PR_NUMBER
          results:
            - name: maas-api-image
              description: odh-maas-api-ci image with odh-pr-<PR> tag
            - name: maas-controller-image
              description: odh-maas-controller-ci image with odh-pr-<PR> tag
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            workingDir: /workspace
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
              - name: PR_NUMBER
                value: $(params.PR_NUMBER)
              - name: COMPONENT_NAME
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['appstudio.openshift.io/component']
            script: |
              #!/bin/sh
              set -eu

              # Extract the labeled component image (for logs; parse-metadata drives component-container-image)
              COMPONENT_CONTAINER_IMAGE=$(jq -r --arg component_name "${COMPONENT_NAME}" '.components[] | select(.name == $component_name) | .containerImage' <<< "${SNAPSHOT}")
              echo "  COMPONENT_CONTAINER_IMAGE: ${COMPONENT_CONTAINER_IMAGE}"

              # Extract digest refs from snapshot, then strip @sha256:... to get the repo.
              # Append the odh-pr-<PR> tag created by the build pipeline's additional-tags.
              MAAS_API_DIGEST=$(jq -r '.components[] | select(.name == "odh-maas-api-ci") | .containerImage' <<< "${SNAPSHOT}")
              if [ -z "${MAAS_API_DIGEST}" ] || [ "${MAAS_API_DIGEST}" = "null" ]; then
                echo "ERROR: odh-maas-api-ci not found in snapshot" >&2
                exit 1
              fi
              MAAS_API_IMAGE="${MAAS_API_DIGEST%%@*}:odh-pr-${PR_NUMBER}"

              MAAS_CONTROLLER_DIGEST=$(jq -r '.components[] | select(.name == "odh-maas-controller-ci") | .containerImage' <<< "${SNAPSHOT}")
              if [ -z "${MAAS_CONTROLLER_DIGEST}" ] || [ "${MAAS_CONTROLLER_DIGEST}" = "null" ]; then
                echo "ERROR: odh-maas-controller-ci not found in snapshot" >&2
                exit 1
              fi
              MAAS_CONTROLLER_IMAGE="${MAAS_CONTROLLER_DIGEST%%@*}:odh-pr-${PR_NUMBER}"

              echo "  MAAS_API_IMAGE (digest):      ${MAAS_API_DIGEST}"
              echo "  MAAS_API_IMAGE (PR tag):       ${MAAS_API_IMAGE}"
              echo "  MAAS_CONTROLLER_IMAGE (digest): ${MAAS_CONTROLLER_DIGEST}"
              echo "  MAAS_CONTROLLER_IMAGE (PR tag): ${MAAS_CONTROLLER_IMAGE}"

              echo -n "${MAAS_API_IMAGE}" > "$(results.maas-api-image.path)"
              echo -n "${MAAS_CONTROLLER_IMAGE}" > "$(results.maas-controller-image.path)"
      - name: check-prerequisites
        description: check prerequisites if the ITS needs to execute
        runAfter:
          - find-component-image
        taskSpec:
          results:
          - name: event-type
            description: "stores info about event type"
          - name: pull-request-author
          - name: pull-request-number
          - name: git-repo
          - name: git-org
          - name: git-revision
          steps:
          - image: quay.io/konflux-ci/konflux-test:stable
            env:
              - name: EVENT_TYPE
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/event-type']
              - name: PR_AUTHOR
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sender']
              - name: PR_NUMBER
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.labels['pac.test.appstudio.openshift.io/pull-request']
              - name: GIT_REPO
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-repository']
              - name: GIT_ORG
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/url-org']
              - name: GIT_REVISION
                valueFrom:
                  fieldRef:
                    fieldPath: metadata.annotations['pac.test.appstudio.openshift.io/sha']
            script: |
              #!/bin/bash
              set -e
              echo "EVENT_TYPE=${EVENT_TYPE}"
              echo -n "${EVENT_TYPE}" > $(results.event-type.path)
              echo -n "${PR_AUTHOR}" > "$(results.pull-request-author.path)"
              echo -n "${PR_NUMBER}" > "$(results.pull-request-number.path)"
              echo -n "${GIT_REPO}" > "$(results.git-repo.path)"
              echo -n "${GIT_ORG}" > "$(results.git-org.path)"
              echo -n "${GIT_REVISION}" > "$(results.git-revision.path)"

      - name: provision-eaas-space
        runAfter:
          - check-prerequisites
        taskRef:
          resolver: git
          params:
            - name: url
              value: https://github.com/konflux-ci/build-definitions.git
            - name: revision
              value: main
            - name: pathInRepo
              value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
        params:
          - name: ownerName
            value: $(context.pipelineRun.name)
          - name: ownerUid
            value: $(context.pipelineRun.uid)
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]
      - name: provision-cluster
        runAfter:
          - provision-eaas-space
        taskSpec:
          results:
            - name: clusterName
              value: "$(steps.create-cluster.results.clusterName)"
          steps:
            - name: get-supported-versions
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
            - name: pick-version
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
              params:
                - name: prefix
                  value: "$(steps.get-supported-versions.results.versions[0])."
            - name: create-cluster
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: version
                  value: "$(steps.pick-version.results.version)"
                - name: instanceType
                  value: m5.2xlarge
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]
      - name: e2e-maas-api-openshift
        timeout: 1h
        runAfter:
          - provision-cluster
        params:
        - name: git-url
          value: "$(tasks.parse-metadata.results.source-git-url)"
        - name: git-rev
          value: "$(tasks.parse-metadata.results.source-git-revision)"
        - name: component-image
          value: "$(tasks.parse-metadata.results.component-container-image)"
        - name: maas-api-image
          value: "$(tasks.find-component-image.results.maas-api-image)"
        - name: maas-controller-image
          value: "$(tasks.find-component-image.results.maas-controller-image)"
        taskSpec:
          params:
            - name: git-url
              type: string
            - name: git-rev
              type: string
            - name: component-image
              type: string
            - name: maas-api-image
              type: string
            - name: maas-controller-image
              type: string
          volumes:
            - name: credentials
              emptyDir: {}
          steps:
            - name: get-kubeconfig
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/konflux-ci/build-definitions.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
              params:
                - name: eaasSpaceSecretRef
                  value: $(tasks.provision-eaas-space.results.secretRef)
                - name: clusterName
                  value: "$(tasks.provision-cluster.results.clusterName)"
                - name: credentials
                  value: credentials

            - name: clone-repo
              image: alpine/git
              script: |
                echo $(params.git-url)
                echo $(params.git-rev)
                git clone --depth 50 --no-single-branch $(params.git-url) /workspace/source
                git config --global --add safe.directory /workspace/source
                cd /workspace/source
                git checkout $(params.git-rev)

            - name: e2e-maas-api-openshift
              image: quay.io/rhoai/rhoai-task-toolset:maas
              onError: continue
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
                - name: MAAS_API_IMAGE
                  value: "$(params.maas-api-image)"
                - name: MAAS_CONTROLLER_IMAGE
                  value: "$(params.maas-controller-image)"
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                set -euxo pipefail
                bash
                ./test/e2e/scripts/prow_run_smoke_test.sh
            - name: must-gather
              onError: continue
              image: quay.io/rhoai/rhoai-task-toolset:maas
              env:
                - name: KUBECONFIG
                  value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
                - name: ARTIFACT_DIR
                  value: /workspace/artifacts-dir
              workingDir: /workspace/source
              volumeMounts:
                - name: credentials
                  mountPath: /credentials
              script: |
                #!/bin/bash
                # models-as-a-service must-gather
                mkdir -p "${ARTIFACT_DIR}/gather-models-as-a-service"
                oc adm must-gather --image=quay.io/chkulkar/must-gather:maas-test-v3 --dest-dir "${ARTIFACT_DIR}/gather-models-as-a-service" -- "export COMPONENT=maas; /usr/bin/gather"

                # openshift-must-gather
                mkdir -p "${ARTIFACT_DIR}/gather-openshift"
                oc adm must-gather --dest-dir "${ARTIFACT_DIR}/gather-openshift"
            - name: git-push-artifacts
              ref:
                resolver: git
                params:
                  - name: url
                    value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                  - name: revision
                    value: main
                  - name: pathInRepo
                    value: stepactions/secure-git-push/0.1/secure-git-push.yaml
              params:
                - name: source-path
                  value: /workspace/artifacts-dir
                - name: repo-path
                  value: 'opendatahub-io/odh-build-metadata'
                - name: repo-branch
                  value: 'ci-artifacts'
                - name: sparse-file-path
                  value: 'test-artifacts/docs'
                - name: dest-path
                  value: 'test-artifacts/$(context.pipelineRun.name)'
                - name: pipelinerun-name
                  value: $(context.pipelineRun.name)
            - name: check-test-exit-code
              image: quay.io/konflux-ci/konflux-test:stable
              script: |
                #!/bin/bash
                EXIT_CODE=$(cat $(steps.e2e-maas-api-openshift.exitCode.path))
                if [ "${EXIT_CODE}" != "0" ]; then
                  echo "Tests failed with exit code ${EXIT_CODE}"
                  exit "${EXIT_CODE}"
                fi
        when:
          - input: "$(tasks.check-prerequisites.results.event-type)"
            operator: notin
            values: ["push"]

    finally:
    - name: push-ci-artifacts-and-update-pr
      params:
        - name: oci-artifacts-repo
          value: $(params.oci-artifacts-repo)
        - name: pipeline-status
          value: $(tasks.status)
      taskSpec:
        volumes:
          - name: odh-registry-secret-volume
            secret:
              secretName: odh-registry-secret
              items:
              - key: .dockerconfigjson
                path: oci-storage-dockerconfigjson
        params:
          - name: oci-artifacts-repo
            description: oci-artifacts-repo
          - name: pipeline-status
            type: string
        steps:
          - name: pull-ci-artifacts
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/git-clone/0.1/git-clone.yaml
            params:
              - name: repo-path
                value: 'opendatahub-io/odh-build-metadata'
              - name: repo-branch
                value: 'ci-artifacts'
              - name: sparse-file-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
              - name: dest-path
                value: /workspace/odh-ci-artifacts
              - name: artifacts-dir-path
                value: 'test-artifacts/$(context.pipelineRun.name)'
          - name: secure-push-oci
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: '/workspace/odh-ci-artifacts/test-artifacts/$(context.pipelineRun.name)'
              - name: oci-ref
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: credentials-volume-name
                value: odh-registry-secret-volume
          - name: share-status-on-pull-request
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/pull-request-comment/0.1/pull-request-comment.yaml
            params:
              - name: test-name
                value: $(context.pipelineRun.name)
              - name: oci-container
                value: $(params.oci-artifacts-repo):$(context.pipelineRun.name)
              - name: pipeline-aggregate-status
                value: $(params.pipeline-status)
              - name: pull-request-author
                value: $(tasks.check-prerequisites.results.pull-request-author)
              - name: pull-request-number
                value: $(tasks.check-prerequisites.results.pull-request-number)
              - name: git-repo
                value: $(tasks.check-prerequisites.results.git-repo)
              - name: git-org
                value: $(tasks.check-prerequisites.results.git-org)
              - name: git-revision
                value: $(tasks.check-prerequisites.results.git-revision)
              - name: artifact-browser-url
                value: $(params.artifact-browser-url)
          - name: cleanup-artifacts-from-git
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/red-hat-data-services/rhoai-konflux-tasks.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/cleanup-git-repo/0.1/cleanup-git-repo.yaml
            params:
              - name: work-dir
                value: '/workspace/odh-ci-artifacts'
              - name: artifacts-dir-path
                value: 'test-artifacts'
              - name: dir-to-be-deleted
                value: '$(context.pipelineRun.name)'
